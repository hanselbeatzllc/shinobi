<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#f4f4f4;
color:#111;
overflow-x:hidden;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:#d81b60;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:800;
color:white;
text-decoration:none;
}

.menu-toggle{
font-size:28px;
color:white;
cursor:pointer;
}

/* MENU */

.menu{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#d81b60;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:30px;
transform:translateY(-100%);
transition:.4s;
z-index:2000;
}

.menu.active{
transform:translateY(0);
}

.menu a{
color:white;
font-size:28px;
text-decoration:none;
font-weight:700;
}

.menu .close{
position:absolute;
top:25px;
right:30px;
font-size:32px;
cursor:pointer;
}

/* HEADER */

.header{
padding-top:140px;
text-align:center;
padding-bottom:60px;
}

.header h1{
font-size:50px;
color:#d81b60;
margin-bottom:10px;
}

.header p{
color:#666;
}

/* MUSIC GRID */

.music-grid{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;
padding:0 20px 100px 20px;
}

.music-card{
background:white;
border-radius:14px;
overflow:hidden;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
transition:.3s;
}

.music-card:hover{
transform:translateY(-6px);
}

.music-card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
}

.music-info{
padding:25px;
}

.music-info h3{
margin-bottom:15px;
color:#d81b60;
}

.stream-btn{
display:inline-block;
padding:12px 28px;
border:2px solid #d81b60;
color:#d81b60;
text-decoration:none;
border-radius:30px;
font-weight:600;
transition:.25s;
}

.stream-btn:hover{
background:#d81b60;
color:white;
}

/* FOOTER */

footer{
background:#d81b60;
padding:60px 20px;
text-align:center;
color:white;
}

.footer-icons{
display:flex;
justify-content:center;
gap:26px;
font-size:22px;
margin-bottom:20px;
}

.footer-links{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:10px;
}

.footer-links a{
color:white;
text-decoration:none;
}

.footer-copy{
font-size:13px;
}

/* MOBILE */

@media(max-width:900px){

.music-grid{
grid-template-columns:1fr;
}

.header h1{
font-size:36px;
}

}

</style>

</head>

<script>

const open=document.getElementById("openMenu")
const close=document.getElementById("closeMenu")

<!-- FIREBASE AUTO MUSIC LOADER -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDy_97tXbusM41DKQh8-I9kUUKShn6s9hM",
authDomain:"shinobi-merch.firebaseapp.com",
projectId:"shinobi-merch",
storageBucket:"shinobi-merch.firebasestorage.app",
messagingSenderId:"142889938049",
appId:"1:142889938049:web:61f3b6403a1a8e8daff180"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

const grid=document.getElementById("musicGrid")

onSnapshot(collection(db,"music"),snapshot=>{

snapshot.forEach(doc=>{

const d=doc.data()

grid.innerHTML+=`

<div class="music-card">

<img src="${d.cover}" loading="lazy">

<div class="music-info">

<h3>${d.title}</h3>

<a href="${d.link}" target="_blank" class="stream-btn">
STREAM / DOWNLOAD
</a>

</div>

</div>

`

})

})

</script>
