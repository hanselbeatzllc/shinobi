<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Music</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-size:20px;
font-weight:bold;
letter-spacing:2px;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav ul a{
text-decoration:none;
color:white;
font-size:14px;
letter-spacing:1px;
transition:.3s;
}

nav ul a:hover{
color:#8a5cff;
}

/* HEADER */

.header{
padding-top:140px;
text-align:center;
padding-bottom:60px;
}

.header h1{
font-size:60px;
letter-spacing:4px;
}

.header p{
color:#aaa;
margin-top:10px;
}

/* MUSIC GRID */

.music-grid{
padding:0 10% 100px 10%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:40px;
}

/* ALBUM CARD */

.album{
position:relative;
overflow:hidden;
border-radius:12px;
cursor:pointer;
}

.album img{
width:100%;
display:block;
transition:.4s;
}

.album:hover img{
transform:scale(1.1);
}

.overlay{
position:absolute;
bottom:0;
left:0;
right:0;
padding:20px;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
}

.overlay h3{
margin-bottom:10px;
}

.play{
padding:8px 18px;
border:none;
background:#8a5cff;
color:white;
border-radius:20px;
cursor:pointer;
font-size:12px;
}

/* PLAYER */

.player{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#050505;
padding:15px;
display:flex;
justify-content:center;
border-top:1px solid #222;
}

audio{
width:350px;
}

/* FOOTER */

footer{
background:#050505;
padding:60px 10%;
}

.footer-grid{
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
}

.socials{
display:flex;
gap:20px;
}

.socials a{
text-decoration:none;
color:white;
opacity:.7;
transition:.3s;
}

.socials a:hover{
opacity:1;
color:#8a5cff;
}

.copyright{
text-align:right;
font-size:13px;
color:#777;
}

@media(max-width:800px){

.header h1{
font-size:40px;
}

.footer-grid{
grid-template-columns:1fr;
gap:20px;
text-align:center;
}

.copyright{
text-align:center;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">ARTIST</div>

<ul>
<li><a href="/">Home</a></li>
<li><a href="/music/">Music</a></li>
<li><a href="/videos/">Videos</a></li>
<li><a href="/tour/">Tour</a></li>
<li><a href="/merch/">Merch</a></li>
<li><a href="/about/">About</a></li>
<li><a href="/contact/">Contact</a></li>
</ul>

</nav>


<section class="header">

<h1>MUSIC</h1>
<p>Stream the latest releases</p>

</section>


<section class="music-grid">

<div class="album">

<img src="https://picsum.photos/500?1">

<div class="overlay">

<h3>Track One</h3>

<button class="play" onclick="playSong('song1.mp3')">
Play
</button>

</div>

</div>


<div class="album">

<img src="https://picsum.photos/500?2">

<div class="overlay">

<h3>Track Two</h3>

<button class="play" onclick="playSong('song2.mp3')">
Play
</button>

</div>

</div>


<div class="album">

<img src="https://picsum.photos/500?3">

<div class="overlay">

<h3>Track Three</h3>

<button class="play" onclick="playSong('song3.mp3')">
Play
</button>

</div>

</div>


</section>


<div class="player">

<audio id="audioPlayer" controls></audio>

</div>


<footer>

<div class="footer-grid">

<div class="socials">

<a href="#">Instagram</a>
<a href="#">Twitter</a>
<a href="#">YouTube</a>
<a href="#">Spotify</a>

</div>

<div class="copyright">

© 2026 Shinobi Slime. All Rights Reserved.

</div>

</div>

</footer>


<script>

function playSong(song){

const player = document.getElementById("audioPlayer")

player.src = song

player.play()

}

</script>

</body>
</html>
