<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Music | Shinobi</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(12px);
z-index:1000;
}

.logo{
font-size:22px;
font-weight:800;
letter-spacing:2px;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav ul li a{
text-decoration:none;
color:white;
font-size:14px;
letter-spacing:1px;
transition:.3s;
}

nav ul li a:hover{
color:#8a5cff;
}

.menu-toggle{
display:none;
font-size:26px;
cursor:pointer;
}

/* HEADER */

.header{
padding-top:140px;
text-align:center;
padding-bottom:60px;
}

.header h1{
font-size:60px;
letter-spacing:4px;
margin-bottom:10px;
}

.header p{
color:#aaa;
}

/* MUSIC GRID */

.music-grid{
padding:0 10% 120px 10%;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;
}

@media(min-width:1000px){

.music-grid{
grid-template-columns:repeat(6,1fr);
}

}

/* ALBUM CARD */

.album{
position:relative;
overflow:hidden;
border-radius:12px;
cursor:pointer;
}

.album img{
width:100%;
display:block;
transition:.4s;
}

.album:hover img{
transform:scale(1.1);
}

.overlay{
position:absolute;
bottom:0;
left:0;
right:0;
padding:18px;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
}

.overlay h3{
font-size:14px;
margin-bottom:8px;
}

.play{
padding:6px 16px;
border:none;
background:#8a5cff;
color:white;
border-radius:20px;
cursor:pointer;
font-size:12px;
}

/* PLAYER */

.player{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#050505;
padding:15px;
display:flex;
justify-content:center;
border-top:1px solid #222;
z-index:1000;
}

audio{
width:400px;
}

/* FOOTER */

footer{
background:#050505;
padding:60px 10%;
margin-top:80px;
}

.footer-grid{
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
}

.socials{
display:flex;
gap:20px;
}

.socials a{
font-size:22px;
color:white;
opacity:.7;
transition:.3s;
}

.socials a:hover{
color:#8a5cff;
opacity:1;
}

.copyright{
text-align:right;
font-size:13px;
color:#777;
}

/* MOBILE */

@media(max-width:900px){

nav ul{
position:fixed;
top:70px;
left:-100%;
flex-direction:column;
background:black;
width:100%;
padding:40px;
transition:.4s;
gap:20px;
}

nav ul.active{
left:0;
}

.menu-toggle{
display:block;
}

.header h1{
font-size:40px;
}

.footer-grid{
grid-template-columns:1fr;
gap:30px;
text-align:center;
}

.copyright{
text-align:center;
}

audio{
width:90%;
}

}

</style>

</head>


<body>


<nav>

<div class="logo">Shinobi</div>

<div class="menu-toggle" id="menuToggle">
<i class="fa-solid fa-bars"></i>
</div>

<ul id="navLinks">

<li><a href="../">Home</a></li>
<li><a href="../music/">Music</a></li>
<li><a href="../videos/">Videos</a></li>
<li><a href="../tour/">Tour</a></li>
<li><a href="../merch/">Merch</a></li>
<li><a href="../about/">About</a></li>
<li><a href="../contact/">Contact</a></li>

</ul>

</nav>



<section class="header">

<h1>MUSIC</h1>
<p>Stream the latest releases</p>

</section>



<section class="music-grid">


<div class="album">

<img src="https://picsum.photos/500?1">

<div class="overlay">

<h3>Track One</h3>

<button class="play" onclick="playSong('song1.mp3')">
Play
</button>

</div>

</div>



<div class="album">

<img src="https://picsum.photos/500?2">

<div class="overlay">

<h3>Track Two</h3>

<button class="play" onclick="playSong('song2.mp3')">
Play
</button>

</div>

</div>



<div class="album">

<img src="https://picsum.photos/500?3">

<div class="overlay">

<h3>Track Three</h3>

<button class="play" onclick="playSong('song3.mp3')">
Play
</button>

</div>

</div>



<div class="album">

<img src="https://picsum.photos/500?4">

<div class="overlay">

<h3>Track Four</h3>

<button class="play" onclick="playSong('song4.mp3')">
Play
</button>

</div>

</div>



<div class="album">

<img src="https://picsum.photos/500?5">

<div class="overlay">

<h3>Track Five</h3>

<button class="play" onclick="playSong('song5.mp3')">
Play
</button>

</div>

</div>



<div class="album">

<img src="https://picsum.photos/500?6">

<div class="overlay">

<h3>Track Six</h3>

<button class="play" onclick="playSong('song6.mp3')">
Play
</button>

</div>

</div>



</section>



<div class="player">

<audio id="audioPlayer" controls></audio>

</div>



<footer>

<div class="footer-grid">

<div>

<div class="socials">

<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-x-twitter"></i></a>
<a href="#"><i class="fab fa-youtube"></i></a>
<a href="#"><i class="fab fa-spotify"></i></a>

</div>

</div>

<div class="copyright">

© 2026 Shinobi Slime  
All Rights Reserved

</div>

</div>

</footer>



<script>

function playSong(song){

const player = document.getElementById("audioPlayer")

player.src = song

player.play()

}

const toggle = document.getElementById("menuToggle")
const nav = document.getElementById("navLinks")

toggle.onclick = () =>{
nav.classList.toggle("active")
}

</script>


</body>
</html>
