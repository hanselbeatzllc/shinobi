<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Music | Shinobi</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#f4f4f4;
color:#111;
overflow-x:hidden;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:#d81b60;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:800;
color:white;
}

.menu-toggle{
font-size:28px;
color:white;
cursor:pointer;
}

/* FULLSCREEN MENU */

.menu{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#d81b60;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:30px;
transform:translateY(-100%);
transition:.4s;
z-index:2000;
}

.menu.active{
transform:translateY(0);
}

.menu a{
color:white;
font-size:28px;
text-decoration:none;
font-weight:700;
}

.menu .close{
position:absolute;
top:25px;
right:30px;
font-size:32px;
cursor:pointer;
}

/* HEADER */

.header{
padding-top:140px;
text-align:center;
padding-bottom:60px;
}

.header h1{
font-size:50px;
color:#d81b60;
margin-bottom:10px;
}

.header p{
color:#666;
}

/* MUSIC GRID */

.music-grid{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;
padding:0 20px 100px 20px;
}

.music-card{
background:white;
border-radius:14px;
overflow:hidden;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.music-card img{
width:100%;
}

.music-info{
padding:25px;
}

.music-info h3{
margin-bottom:15px;
color:#d81b60;
}

.stream-btn{
display:inline-block;
padding:12px 28px;
border:2px solid #d81b60;
color:#d81b60;
text-decoration:none;
border-radius:30px;
font-weight:600;
}

/* FOOTER */

footer{
background:#d81b60;
padding:60px 20px;
text-align:center;
color:white;
}

.footer-icons{
display:flex;
justify-content:center;
gap:26px;
font-size:22px;
margin-bottom:20px;
}

.footer-links{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:10px;
}

.footer-links a{
color:white;
text-decoration:none;
}

.footer-copy{
font-size:13px;
}

/* MOBILE */

@media(max-width:900px){

.music-grid{
grid-template-columns:1fr;
}

.header h1{
font-size:36px;
}

}

</style>

</head>


<body>


<nav>

<div class="logo">Shinobi</div>

<div class="menu-toggle" id="openMenu">
<i class="fa-solid fa-bars"></i>
</div>

</nav>


<div class="menu" id="menu">

<div class="close" id="closeMenu">
<i class="fa-solid fa-xmark"></i>
</div>

<a href="../music/">Music</a>
<a href="../videos/">Videos</a>
<a href="../tour/">Tour</a>
<a href="../merch/">Shop</a>
<a href="../contact/">Sign Up</a>

<i class="fab fa-x-twitter"></i>
<i class="fab fa-facebook"></i>
<i class="fab fa-youtube"></i>
<i class="fab fa-spotify"></i>
<i class="fab fa-apple"></i>

</div>

</div>



<section class="header">

<div class="footer-links">

<a href="#">Terms</a>

</div>

<div class="footer-copy">

© 2026 Shinobi Slime

</div>

</footer>



<script>

const open=document.getElementById("openMenu")
const close=document.getElementById("closeMenu")
const menu=document.getElementById("menu")

open.onclick=()=>menu.classList.add("active")
close.onclick=()=>menu.classList.remove("active")

</script>

</body>
</html>
