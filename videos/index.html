<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Videos | Shinobi</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#f4f4f4;
color:#111;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:#d81b60;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:800;
color:white;
letter-spacing:2px;
}

.menu-toggle{
font-size:28px;
color:white;
cursor:pointer;
}

/* FULLSCREEN MENU */

.menu{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#d81b60;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:30px;
transform:translateY(-100%);
transition:.4s;
z-index:2000;
}

.menu.active{
transform:translateY(0);
}

.menu a{
color:white;
font-size:28px;
text-decoration:none;
font-weight:700;
letter-spacing:2px;
}

.menu .close{
position:absolute;
top:25px;
right:30px;
font-size:30px;
cursor:pointer;
}

/* SECTION */

.section{
padding:120px 6% 60px 6%;
max-width:900px;
margin:auto;
}

.section h2{
font-size:30px;
margin-bottom:30px;
color:#d81b60;
}

/* VIDEO CARD */

.video-card{
background:white;
border-radius:14px;
padding:25px;
margin-bottom:40px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
}

.video-card h3{
margin-bottom:20px;
font-size:22px;
color:#d81b60;
}

.video-wrapper{
position:relative;
padding-top:56.25%;
border-radius:10px;
overflow:hidden;
}

.video-wrapper iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

/* PLAY OVERLAY */

.play-overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:white;
opacity:.9;
pointer-events:none;
}

/* SHORTS */

.shorts{
display:flex;
gap:20px;
overflow-x:auto;
padding-bottom:10px;
}

.short{
min-width:220px;
height:380px;
border-radius:12px;
overflow:hidden;
background:black;
}

.short iframe{
width:100%;
height:100%;
border:none;
}

/* PLAYLIST */

.playlist iframe{
width:100%;
height:420px;
border:none;
border-radius:12px;
}

/* FOOTER */

footer{
background:#d81b60;
padding:60px 20px;
margin-top:100px;
text-align:center;
color:white;
}

.footer-icons{
display:flex;
justify-content:center;
gap:26px;
font-size:22px;
margin-bottom:30px;
}

.footer-links{
display:flex;
justify-content:center;
gap:30px;
margin-bottom:20px;
font-size:14px;
}

.footer-links a{
color:white;
text-decoration:none;
}

.footer-copy{
font-size:13px;
opacity:.8;
}

</style>

</head>

<body>

<nav>

<div class="logo">Shinobi</div>

<div class="menu-toggle" id="openMenu">
<i class="fa-solid fa-bars"></i>
</div>

</nav>


<div class="menu" id="menu">

<div class="close" id="closeMenu">
<i class="fa-solid fa-xmark"></i>
</div>

<a href="../music/">Music</a>
<a href="../videos/">Videos</a>
<a href="../tour/">Tour</a>
<a href="../merch/">Shop</a>
<a href="../contact/">Sign Up</a>

<div class="footer-icons">

<i class="fab fa-tiktok"></i>
<i class="fab fa-instagram"></i>
<i class="fab fa-x-twitter"></i>
<i class="fab fa-facebook"></i>
<i class="fab fa-youtube"></i>
<i class="fab fa-spotify"></i>
<i class="fab fa-apple"></i>

</div>

</div>


<!-- VIDEOS -->

<section class="section">

<h2>VIDEOS</h2>

<div id="videosContainer">

<!-- Existing videos remain -->

<div class="video-card">
<h3>Shinobi – Porsche Date</h3>
<div class="video-wrapper">
<iframe loading="lazy"
src="https://www.youtube-nocookie.com/embed/VsB5iWSARJU"
allowfullscreen></iframe>
<div class="play-overlay"><i class="fa-solid fa-play"></i></div>
</div>
</div>

</div>

</section>


<!-- SHORTS -->

<section class="section">

<h2>SHORTS</h2>

<div class="shorts">

<div class="short">
<iframe loading="lazy"
src="https://www.youtube-nocookie.com/embed/O2C1znndNy0"></iframe>
</div>

<div class="short">
<iframe loading="lazy"
src="https://www.youtube-nocookie.com/embed/pq-36tRoZh4"></iframe>
</div>

<div class="short">
<iframe loading="lazy"
src="https://www.youtube-nocookie.com/embed/WyYwGo_kmHw"></iframe>
</div>

</div>

</section>


<!-- PLAYLIST -->

<section class="section playlist">

<h2>PLAYLIST</h2>

<iframe loading="lazy"
src="https://www.youtube-nocookie.com/embed/videoseries?list=PLWnNuLXLM302trYltN7a4bw-ToJdnWfku"></iframe>

</section>


<footer>

<div class="footer-icons">

<i class="fab fa-tiktok"></i>
<i class="fab fa-instagram"></i>
<i class="fab fa-x-twitter"></i>
<i class="fab fa-facebook"></i>
<i class="fab fa-youtube"></i>
<i class="fab fa-spotify"></i>
<i class="fab fa-apple"></i>

</div>

<div class="footer-links">

<a href="#">Terms</a>
<a href="#">Privacy</a>

</div>

<div class="footer-copy">

© 2026 Shinobi Slime

</div>

</footer>


<script>

const open=document.getElementById("openMenu")
const close=document.getElementById("closeMenu")
const menu=document.getElementById("menu")

open.onclick=()=>menu.classList.add("active")
close.onclick=()=>menu.classList.remove("active")

</script>


<!-- FIREBASE VIDEO AUTO LOAD -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDy_97tXbusM41DKQh8-I9kUUKShn6s9hM",
authDomain:"shinobi-merch.firebaseapp.com",
projectId:"shinobi-merch",
storageBucket:"shinobi-merch.firebasestorage.app",
messagingSenderId:"142889938049",
appId:"1:142889938049:web:61f3b6403a1a8e8daff180"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

const container=document.getElementById("videosContainer")

onSnapshot(collection(db,"videos"),snapshot=>{

snapshot.forEach(doc=>{

const v=doc.data()

container.innerHTML+=`

<div class="video-card">
<h3>${v.title}</h3>

<div class="video-wrapper">

<iframe loading="lazy"
src="https://www.youtube-nocookie.com/embed/${v.youtube}"
allowfullscreen></iframe>

<div class="play-overlay">
<i class="fa-solid fa-play"></i>
</div>

</div>

</div>

`

})

})

</script>

</body>
</html>
