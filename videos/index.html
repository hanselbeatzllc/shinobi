<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Videos | Shinobi</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(12px);
z-index:1000;
}

.logo{
font-size:22px;
font-weight:800;
letter-spacing:2px;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav ul li a{
text-decoration:none;
color:white;
font-size:14px;
}

nav ul li a:hover{
color:#8a5cff;
}

.menu-toggle{
display:none;
font-size:26px;
cursor:pointer;
}

/* HERO VIDEO */

.hero{
padding-top:120px;
width:100%;
}

.hero-video{
position:relative;
width:100%;
padding-top:56.25%;
}

.hero-video iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

/* SECTION */

.section{
padding:80px 8%;
}

.section h2{
margin-bottom:30px;
font-size:30px;
}

/* VIDEO GRID */

.video-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.video-card{
position:relative;
border-radius:12px;
overflow:hidden;
background:#000;
}

.video-card iframe{
width:100%;
height:220px;
border:none;
}

/* PLAY OVERLAY */

.play-overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
color:white;
opacity:.9;
pointer-events:none;
}

/* SHORTS */

.shorts{
display:flex;
gap:20px;
overflow-x:auto;
}

.short{
min-width:220px;
height:380px;
background:#000;
border-radius:12px;
overflow:hidden;
}

.short iframe{
width:100%;
height:100%;
border:none;
}

/* PLAYLIST */

.playlist iframe{
width:100%;
height:380px;
border:none;
border-radius:12px;
}

/* FOOTER */

footer{
background:#050505;
padding:60px 10%;
margin-top:80px;
}

.footer-grid{
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
}

.socials{
display:flex;
gap:20px;
}

.socials a{
font-size:22px;
color:white;
opacity:.7;
}

.socials a:hover{
color:#8a5cff;
}

.copyright{
text-align:right;
font-size:13px;
color:#777;
}

/* MOBILE */

@media(max-width:900px){

nav ul{
position:fixed;
top:70px;
left:-100%;
flex-direction:column;
background:black;
width:100%;
padding:40px;
transition:.4s;
gap:20px;
}

nav ul.active{
left:0;
}

.menu-toggle{
display:block;
}

.video-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>


<nav>

<div class="logo">Shinobi</div>

<div class="menu-toggle" id="menuToggle">
<i class="fa-solid fa-bars"></i>
</div>

<ul id="navLinks">

<li><a href="../">Home</a></li>
<li><a href="../music/">Music</a></li>
<li><a href="../videos/">Videos</a></li>
<li><a href="../tour/">Tour</a></li>
<li><a href="../merch/">Merch</a></li>
<li><a href="../about/">About</a></li>
<li><a href="../contact/">Contact</a></li>

</ul>

</nav>


<!-- HERO VIDEO -->

<section class="hero">

<div class="hero-video">

<iframe
src="https://www.youtube.com/embed/XAj0Ys-xVEk?autoplay=1&mute=1&loop=1"
allow="autoplay"
allowfullscreen>
</iframe>

</div>

</section>


<!-- LATEST VIDEOS -->

<section class="section">

<h2>Latest Videos</h2>

<div class="video-grid" id="videoGrid"></div>

</section>


<!-- SHORTS -->

<section class="section">

<h2>Shorts</h2>

<div class="shorts">

<div class="short">
<iframe src="https://www.youtube.com/embed/O2C1znndNy0"></iframe>
</div>

<div class="short">
<iframe src="https://www.youtube.com/embed/pq-36tRoZh4"></iframe>
</div>

<div class="short">
<iframe src="https://www.youtube.com/embed/WyYwGo_kmHw"></iframe>
</div>

<div class="short">
<iframe src="https://www.youtube.com/embed/rUsgz0F3yZc"></iframe>
</div>
  
<div class="short">
<iframe src="https://www.youtube.com/embed/GlnxdMDJobA"></iframe>
</div>

</div>

</section>


<!-- PLAYLIST -->

<section class="section playlist">

<h2>Featured Playlist</h2>

<iframe
src="https://www.youtube.com/embed/videoseries?list=PLWnNuLXLM302trYltN7a4bw-ToJdnWfku">
</iframe>

</section>


<footer>

<div class="footer-grid">

<div>

<div class="socials">

<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-x-twitter"></i></a>
<a href="#"><i class="fab fa-youtube"></i></a>
<a href="#"><i class="fab fa-spotify"></i></a>

</div>

</div>

<div class="copyright">

© 2026 Shinobi Slime  
All Rights Reserved

</div>

</div>

</footer>


<script>

/* MOBILE MENU */

const toggle=document.getElementById("menuToggle")
const nav=document.getElementById("navLinks")

toggle.onclick=()=>{
nav.classList.toggle("active")
}

/* AUTO SYNC VIDEOS FROM CHANNEL */

const apiKey="YOUR_YOUTUBE_API_KEY"
const channelId="CHANNEL_ID"

async function loadVideos(){

const res=await fetch(
`https://www.googleapis.com/youtube/v3/search?key=${apiKey}&channelId=${channelId}&part=snippet,id&order=date&maxResults=6`
)

const data=await res.json()

const grid=document.getElementById("videoGrid")

data.items.forEach(v=>{

if(v.id.videoId){

grid.innerHTML+=`
<div class="video-card">

<iframe
src="https://www.youtube.com/embed/${v.id.videoId}">
</iframe>

<div class="play-overlay">
<i class="fa-solid fa-play"></i>
</div>

</div>
`

}

})

}

loadVideos()

</script>


</body>
</html>
