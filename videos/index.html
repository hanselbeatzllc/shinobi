<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Videos | Shinobi</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(12px);
z-index:1000;
}

.logo{
font-size:22px;
font-weight:800;
letter-spacing:2px;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav ul li a{
text-decoration:none;
color:white;
font-size:14px;
letter-spacing:1px;
transition:.3s;
}

nav ul li a:hover{
color:#8a5cff;
}

.menu-toggle{
display:none;
font-size:26px;
cursor:pointer;
}

/* HEADER */

.header{
padding-top:140px;
padding-bottom:60px;
text-align:center;
}

.header h1{
font-size:60px;
letter-spacing:4px;
}

.header p{
color:#aaa;
margin-top:10px;
}

/* VIDEO GRID */

.video-grid{
padding:0 10% 120px 10%;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;
}

.video-item iframe{
width:100%;
height:260px;
border:none;
border-radius:12px;
}

/* DESKTOP */

@media(min-width:1000px){

.video-grid{
grid-template-columns:repeat(3,1fr);
}

.video-item iframe{
height:300px;
}

}

/* FOOTER */

footer{
background:#050505;
padding:60px 10%;
}

.footer-grid{
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
}

.socials{
display:flex;
gap:20px;
}

.socials a{
font-size:22px;
color:white;
opacity:.7;
transition:.3s;
}

.socials a:hover{
color:#8a5cff;
opacity:1;
}

.copyright{
text-align:right;
font-size:13px;
color:#777;
}

/* MOBILE */

@media(max-width:900px){

nav ul{
position:fixed;
top:70px;
left:-100%;
flex-direction:column;
background:black;
width:100%;
padding:40px;
transition:.4s;
gap:20px;
}

nav ul.active{
left:0;
}

.menu-toggle{
display:block;
}

.header h1{
font-size:40px;
}

.footer-grid{
grid-template-columns:1fr;
gap:30px;
text-align:center;
}

.copyright{
text-align:center;
}

}

</style>

</head>


<body>


<nav>

<div class="logo">Shinobi</div>

<div class="menu-toggle" id="menuToggle">
<i class="fa-solid fa-bars"></i>
</div>

<ul id="navLinks">

<li><a href="../">Home</a></li>
<li><a href="../music/">Music</a></li>
<li><a href="../videos/">Videos</a></li>
<li><a href="../tour/">Tour</a></li>
<li><a href="../merch/">Merch</a></li>
<li><a href="../about/">About</a></li>
<li><a href="../contact/">Contact</a></li>

</ul>

</nav>



<section class="header">

<h1>VIDEOS</h1>
<p>Watch official music videos</p>

</section>



<section class="video-grid">

<div class="video-item">

<iframe
src="https://www.youtube.com/embed/VsB5iWSARJU"
allowfullscreen>
</iframe>

</div>


<div class="video-item">

<iframe
src="https://www.youtube.com/embed/Ojr7Dubt_SA"
allowfullscreen>
</iframe>

</div>


<div class="video-item">

<iframe
src="https://www.youtube.com/embed/Z3nMMAJ4-sI"
allowfullscreen>
</iframe>

</div>


<div class="video-item">

<iframe
src="https://www.youtube.com/embed/w9cpzVUczho"
allowfullscreen>
</iframe>

</div>


<div class="video-item">

<iframe
src="https://www.youtube.com/embed/hfeJo-5DHPk"
allowfullscreen>
</iframe>

</div>


<div class="video-item">

<iframe
src="https://www.youtube.com/embed/F1Sb5YOyEgQ"
allowfullscreen>
</iframe>

</div>


</section>



<footer>

<div class="footer-grid">

<div>

<div class="socials">

<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-x-twitter"></i></a>
<a href="#"><i class="fab fa-youtube"></i></a>
<a href="#"><i class="fab fa-spotify"></i></a>

</div>

</div>

<div class="copyright">

© 2026 Shinobi Slime  
All Rights Reserved

</div>

</div>

</footer>



<script>

const toggle = document.getElementById("menuToggle")
const nav = document.getElementById("navLinks")

toggle.onclick = () =>{
nav.classList.toggle("active")
}

</script>


</body>
</html>
