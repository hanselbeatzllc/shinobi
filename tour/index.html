<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tour | Shinobi</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#f4f4f4;
color:#111;
overflow-x:hidden;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:#d81b60;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:800;
color:white;
text-decoration:none;
}

.menu-toggle{
font-size:28px;
color:white;
cursor:pointer;
}

/* MENU */

.menu{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#d81b60;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:30px;
transform:translateY(-100%);
transition:.4s;
z-index:2000;
}

.menu.active{
transform:translateY(0);
}

.menu a{
color:white;
font-size:28px;
text-decoration:none;
font-weight:700;
}

.menu .close{
position:absolute;
top:25px;
right:30px;
font-size:32px;
cursor:pointer;
}

/* HEADER */

.header{
padding-top:140px;
text-align:center;
padding-bottom:60px;
}

.header h1{
font-size:50px;
color:#d81b60;
margin-bottom:10px;
}

.header p{
color:#666;
}

/* FILTERS */

.filters{
max-width:900px;
margin:auto;
display:flex;
gap:20px;
padding:0 20px 40px 20px;
}

.filters input,
.filters select{
padding:12px 16px;
border:none;
border-radius:30px;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

/* TOUR LIST */

.tour-list{
max-width:900px;
margin:auto;
padding:0 20px 100px 20px;
}

.tour-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px;
margin-bottom:20px;
background:white;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
transition:.3s;
}

.tour-item:hover{
transform:translateY(-5px);
}

.date{
font-size:20px;
font-weight:800;
color:#d81b60;
width:90px;
}

.location{
flex:1;
}

.location h3{
font-size:18px;
}

.location p{
font-size:14px;
color:#666;
}

.countdown{
font-size:13px;
color:#888;
margin-top:5px;
}

.ticket-btn{
padding:12px 26px;
border-radius:30px;
background:#d81b60;
color:white;
text-decoration:none;
font-weight:600;
}

.ticket-btn:hover{
opacity:.9;
}

.soldout{
background:#aaa;
cursor:not-allowed;
}

/* FOOTER */

footer{
background:#d81b60;
padding:60px 20px;
text-align:center;
color:white;
}

.footer-icons{
display:flex;
justify-content:center;
gap:26px;
font-size:22px;
margin-bottom:20px;
}

.footer-links{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:10px;
}

.footer-links a{
color:white;
text-decoration:none;
}

.footer-copy{
font-size:13px;
}

/* MOBILE */

@media(max-width:900px){

.filters{
flex-direction:column;
}

.tour-item{
flex-direction:column;
align-items:flex-start;
gap:15px;
}

}

</style>

</head>


<body>


<nav>

<a href="../" class="logo">Shinobi</a>

<div class="menu-toggle" id="openMenu">
<i class="fa-solid fa-bars"></i>
</div>

</nav>


<div class="menu" id="menu">

<div class="close" id="closeMenu">
<i class="fa-solid fa-xmark"></i>
</div>

<a href="../music/">Music</a>
<a href="../videos/">Videos</a>
<a href="../tour/">Tour</a>
<a href="../merch/">Shop</a>
<a href="../contact/">Sign Up</a>

<div class="footer-icons">

<i class="fab fa-tiktok"></i>
<i class="fab fa-instagram"></i>
<i class="fab fa-x-twitter"></i>
<i class="fab fa-facebook"></i>
<i class="fab fa-youtube"></i>
<i class="fab fa-spotify"></i>
<i class="fab fa-apple"></i>

</div>
  
</div>


<section class="header">

<h1>TOUR</h1>
<p>Upcoming shows and live performances</p>

</section>



<div class="filters">

<input type="text" id="searchCity" placeholder="Search city">

<select id="monthFilter">
<option value="">All Months</option>
<option value="JAN">JANUARY</option>
<option value="FEB">FEBRUARY</option>
<option value="MAR">MARCH</option>
<option value="APR">APRIL</option>
<option value="MAY">MAY</option>
<option value="JUN">JUNE</option>
<option value="JUL">July</option>
<option value="AUG">August</option>
<option value="SEP">September</option>
<option value="OCT">OCTOBER</option>
<option value="NOV">NOVEMBER</option>
<option value="DEC">DECEMBER</option>
</select>

</div>



<section class="tour-list" id="tourList">


<div class="tour-item" data-city="Kilifi" data-month="MAR" data-date="2026-03-20">

<div class="date">MAR 20</div>

<div class="location">
<h3>Kilifi</h3>
<p>Club Kavenya</p>
<div class="countdown"></div>
</div>

<a class="ticket-btn" href="https://ticketmaster.com" target="_blank">Tickets</a>

</div>

</section>



<footer>

<div class="footer-icons">

<i class="fab fa-tiktok"></i>
<i class="fab fa-instagram"></i>
<i class="fab fa-x-twitter"></i>
<i class="fab fa-facebook"></i>
<i class="fab fa-youtube"></i>
<i class="fab fa-spotify"></i>
<i class="fab fa-apple"></i>

</div>

<div class="footer-links">

<a href="#">Terms</a>
<a href="#">Privacy</a>

</div>

<div class="footer-copy">

© 2026 Shinobi Slime

</div>

</footer>



<script>

/* MENU */

const open=document.getElementById("openMenu")
const close=document.getElementById("closeMenu")
const menu=document.getElementById("menu")

open.onclick=()=>menu.classList.add("active")
close.onclick=()=>menu.classList.remove("active")

/* SEARCH */

const search=document.getElementById("searchCity")
const month=document.getElementById("monthFilter")
const tours=document.querySelectorAll(".tour-item")

function filterTours(){

const cityValue=search.value.toLowerCase()
const monthValue=month.value

tours.forEach(tour=>{

const city=tour.dataset.city.toLowerCase()
const tourMonth=tour.dataset.month

const cityMatch=city.includes(cityValue)
const monthMatch=monthValue===""||monthValue===tourMonth

tour.style.display=(cityMatch&&monthMatch)?"flex":"none"

})

}

search.addEventListener("input",filterTours)
month.addEventListener("change",filterTours)

/* COUNTDOWN */

function updateCountdown(){

const now=new Date()

document.querySelectorAll(".tour-item").forEach(item=>{

const date=new Date(item.dataset.date)
const diff=date-now

if(diff>0){

const days=Math.floor(diff/(1000*60*60*24))
const hours=Math.floor((diff/(1000*60*60))%24)
const mins=Math.floor((diff/(1000*60))%60)

item.querySelector(".countdown").textContent =
days+"d "+hours+"h "+mins+"m until show"

}else{

item.querySelector(".countdown").textContent="Show started"

}

})

}

updateCountdown()
setInterval(updateCountdown,60000)

</script>


</body>
</html>
