<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Merch | Shinobi</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#f4f4f4;
color:#111;
overflow-x:hidden;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:#d81b60;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:800;
color:white;
}

.cart-icon{
position:relative;
color:white;
font-size:22px;
cursor:pointer;
}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
background:white;
color:#d81b60;
font-size:12px;
padding:3px 7px;
border-radius:50%;
}

/* HEADER */

.header{
padding-top:120px;
text-align:center;
padding-bottom:40px;
}

.header h1{
font-size:44px;
color:#d81b60;
}

/* PRODUCTS */

.products{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;
padding:0 20px 100px 20px;
}

.product{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.product img{
width:100%;
height:260px;
object-fit:cover;
display:block;
}

.product-info{
padding:20px;
}

.product-info h3{
color:#d81b60;
margin-bottom:6px;
}

.price{
margin-bottom:12px;
font-weight:600;
}

select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ddd;
}

.add-btn{
width:100%;
padding:12px;
background:#d81b60;
border:none;
color:white;
border-radius:30px;
cursor:pointer;
}

/* CART PANEL */

.cart-panel{
position:fixed;
right:-400px;
top:0;
width:380px;
height:100%;
background:white;
padding:30px;
box-shadow:-5px 0 20px rgba(0,0,0,.25);
transition:.35s;
z-index:3000;
overflow:auto;
}

.cart-panel.active{
right:0;
}

.cart-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.close-cart{
font-size:22px;
cursor:pointer;
color:#d81b60;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
font-size:14px;
border-bottom:1px solid #eee;
padding-bottom:8px;
}

.remove{
color:red;
cursor:pointer;
font-weight:bold;
margin-left:10px;
}

.checkout-btn{
margin-top:20px;
width:100%;
padding:14px;
background:#d81b60;
border:none;
color:white;
border-radius:30px;
cursor:pointer;
}

/* FOOTER */

footer{
background:#d81b60;
padding:50px 20px;
text-align:center;
color:white;
}

.footer-icons{
display:flex;
justify-content:center;
gap:26px;
font-size:22px;
margin-bottom:20px;
}

/* MOBILE */

@media(max-width:768px){

.products{
grid-template-columns:1fr;
gap:24px;
padding:0 16px 80px 16px;
}

.product img{
height:220px;
}

.header h1{
font-size:36px;
}

.cart-panel{
width:100%;
right:-100%;
}

.cart-panel.active{
right:0;
}

nav{
padding:16px;
}

}

</style>

</head>

<body>


<nav>

<div class="logo">Shinobi</div>

<div class="cart-icon" onclick="toggleCart()">
<i class="fa-solid fa-shopping-cart"></i>
<span class="cart-count" id="cartCount">0</span>
</div>

</nav>


<section class="header">

<h1>MERCH</h1>

</section>


<section class="products">

<div class="product">

<img src="merch1.jpg">

<div class="product-info">

<h3>Artist Hoodie</h3>
<div class="price">$65</div>

<select class="size">
<option value="">Select Size</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<select class="color">
<option value="">Select Color</option>
<option>Black</option>
<option>Pink</option>
<option>White</option>
</select>

<button class="add-btn" onclick="addToCart('Artist Hoodie','$65',this)">
Add to Cart
</button>

</div>
</div>


<div class="product">

<img src="merch2.jpg">

<div class="product-info">

<h3>Tour Shirt</h3>
<div class="price">$35</div>

<select class="size">
<option value="">Select Size</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<select class="color">
<option value="">Select Color</option>
<option>Black</option>
<option>Pink</option>
<option>White</option>
</select>

<button class="add-btn" onclick="addToCart('Tour Shirt','$35',this)">
Add to Cart
</button>

</div>
</div>


<div class="product">

<img src="merch3.jpg">

<div class="product-info">

<h3>Artist Hat</h3>
<div class="price">$25</div>

<select class="color">
<option value="">Select Color</option>
<option>Black</option>
<option>Pink</option>
<option>White</option>
</select>

<button class="add-btn" onclick="addToCart('Artist Hat','$25',this)">
Add to Cart
</button>

</div>
</div>


<div class="product">

<img src="merch4.jpg">

<div class="product-info">

<h3>Limited Vinyl</h3>
<div class="price">$40</div>

<button class="add-btn" onclick="addToCart('Limited Vinyl','$40',this)">
Add to Cart
</button>

</div>
</div>

</section>


<!-- CART -->

<div class="cart-panel" id="cartPanel">

<div class="cart-header">

<h2>Your Cart</h2>

<div class="close-cart" onclick="toggleCart()">
<i class="fa-solid fa-xmark"></i>
</div>

</div>

<div id="cartItems"></div>

<button class="checkout-btn">
Checkout
</button>

</div>


<footer>

<div class="footer-icons">

<i class="fab fa-tiktok"></i>
<i class="fab fa-instagram"></i>
<i class="fab fa-x-twitter"></i>
<i class="fab fa-facebook"></i>
<i class="fab fa-youtube"></i>
<i class="fab fa-spotify"></i>
<i class="fab fa-apple"></i>

</div>

<p>© 2026 Shinobi Slime</p>

</footer>


<script>

let cart=[]

function addToCart(name,price,btn){

const product=btn.parentElement

const size=product.querySelector(".size")?.value || ""
const color=product.querySelector(".color")?.value || ""

cart.push({name,price,size,color})

updateCart()

}

function updateCart(){

const list=document.getElementById("cartItems")

list.innerHTML=""

cart.forEach((item,index)=>{

list.innerHTML+=`

<div class="cart-item">

<span>

${item.name}
${item.size ? " - "+item.size : ""}
${item.color ? " - "+item.color : ""}

</span>

<span>

${item.price}
<span class="remove" onclick="removeItem(${index})">✕</span>

</span>

</div>

`

})

document.getElementById("cartCount").textContent=cart.length

}

function removeItem(index){

cart.splice(index,1)

updateCart()

}

function toggleCart(){

document.getElementById("cartPanel")
.classList.toggle("active")

}

</script>

</body>
</html>
