<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Merch | Shinobi</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- PayPal -->
<script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=USD"></script>

<!-- Mailchimp -->
<script id="mcjs">
!function(c,h,i,m,p){
m=c.createElement(h),
p=c.getElementsByTagName(h)[0],
m.async=1,
m.src=i,
p.parentNode.insertBefore(m,p)
}(document,"script","https://chimpstatic.com/mcjs-connected/js/users/c9d2e3f926dcdd5d265321a6c/a7aca8d3f72c02130da9e9a49.js");
</script>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body{
background:#f4f4f4;
color:#111;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:#d81b60;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:800;
color:white;
text-decoration:none;
}

.nav-icons{
display:flex;
gap:20px;
font-size:22px;
color:white;
cursor:pointer;
}

/* MENU */

.menu{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#d81b60;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:30px;
transform:translateY(-100%);
transition:.4s;
z-index:2000;
}

.menu.active{
transform:translateY(0);
}

.menu a{
color:white;
font-size:28px;
text-decoration:none;
font-weight:700;
}

.menu-close{
position:absolute;
top:30px;
right:30px;
font-size:28px;
color:white;
cursor:pointer;
}

/* HEADER */

.header{
padding-top:120px;
text-align:center;
padding-bottom:40px;
}

.header h1{
font-size:44px;
color:#d81b60;
}

/* PRODUCTS */

.products{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;
padding:0 20px 100px;
}

/* 🔥 UPDATED PRODUCT CARD ONLY */
.product{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 15px 35px rgba(0,0,0,.12);
transition:.3s;
}

.product:hover{
transform:translateY(-8px);
box-shadow:0 20px 45px rgba(0,0,0,.18);
}

.product img{
width:100%;
height:260px;
object-fit:contain;
padding:20px;
background:#f9f9f9;
}

.product-info{
padding:20px;
}

.product-info h3{
color:#d81b60;
margin-bottom:6px;
font-size:20px;
}

.price{
margin-bottom:10px;
font-weight:600;
}

select,input{
width:100%;
padding:10px;
margin-bottom:8px;
border-radius:6px;
border:1px solid #ddd;
}

.add-btn{
width:100%;
padding:12px;
background:#d81b60;
border:none;
color:white;
border-radius:30px;
cursor:pointer;
transition:.25s;
}

.add-btn:hover{
background:#b9154d;
}

/* CART */

.cart-panel{
position:fixed;
right:-420px;
top:0;
width:380px;
height:100%;
background:white;
padding:30px;
box-shadow:-5px 0 20px rgba(0,0,0,.25);
transition:.35s;
z-index:3000;
overflow:auto;
}

.cart-panel.active{
right:0;
}

.cart-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.close-cart{
font-size:22px;
cursor:pointer;
color:#d81b60;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
border-bottom:1px solid #eee;
padding-bottom:10px;
font-size:14px;
}

.remove{
color:red;
cursor:pointer;
}

.qty{
width:60px;
}

/* FOOTER */

footer{
background:#d81b60;
padding:60px 20px 70px;
text-align:center;
color:white;
}

.footer-icons{
display:flex;
justify-content:center;
gap:26px;
font-size:22px;
margin-bottom:20px;
}

.footer-links a{
color:white;
text-decoration:none;
font-weight:500;
}

.footer-links a:hover{
opacity:0.7;
}

/* MOBILE */

@media(max-width:768px){

.products{
grid-template-columns:1fr;
}

.cart-panel{
width:100%;
right:-100%;
}

.cart-panel.active{
right:0;
}

}

</style>

</head>

<body>

<!-- NAV -->

<nav>

<a href="../" class="logo">Shinobi</a>

<div class="nav-icons">

<div style="position:relative;">
  <i class="fa-solid fa-shopping-cart" onclick="toggleCart()"></i>
  <span id="cartCount" style="
    position:absolute;
    top:-8px;
    right:-10px;
    background:white;
    color:#d81b60;
    font-size:12px;
    font-weight:700;
    padding:2px 6px;
    border-radius:50%;
    display:none;
  ">0</span>
</div>
  
<i class="fa-solid fa-bars" onclick="openMenu()"></i>

</div>

</nav>

<!-- MENU -->

<div class="menu" id="menu">

<div class="menu-close" onclick="closeMenu()">
<i class="fa-solid fa-xmark"></i>
</div>

<a href="../music/">Music</a>
<a href="../videos/">Videos</a>
<a href="../tour/">Tour</a>
<a href="../merch/">Shop</a>
<a href="../contact/">Sign Up</a>

<div class="footer-icons">

<i class="fab fa-tiktok"></i>
<i class="fab fa-instagram"></i>
<i class="fab fa-x-twitter"></i>
<i class="fab fa-facebook"></i>
<i class="fab fa-youtube"></i>
<i class="fab fa-spotify"></i>
<i class="fab fa-apple"></i>

</div>
  
</div>

<section class="header">

<h1>MERCH</h1>

</section>

<!-- PRODUCTS -->

<section class="products" id="productsContainer">

<div class="product">

<img src="../slime-black.webp" loading="lazy"
onerror="this.src='https://via.placeholder.com/600x400?text=Merch+Image'">

<div class="product-info">

<h3>Slime Shinobi</h3>
<div class="price">$65</div>

<select id="size1">
<option>S</option><option>M</option><option>L</option><option>XL</option>
</select>

<select id="color1">
<option>Black</option><option>Pink</option><option>White</option>
</select>

<input class="qty" id="qty1" type="number" value="1" min="1">

<button class="add-btn"
onclick="addToCart('Slime Shinobi',65,'size1','color1','qty1')">
Add to Cart
</button>

</div>
</div>

<div class="product">

<img src="../tops-pink.webp" loading="lazy"
onerror="this.src='https://via.placeholder.com/600x400?text=Merch+Image'">

<div class="product-info">

<h3>Slime Tops</h3>
<div class="price">$35</div>

<select id="size2">
<option>S</option><option>M</option><option>L</option><option>XL</option>
</select>

<select id="color2">
<option>Black</option><option>Pink</option><option>White</option>
</select>

<input class="qty" id="qty2" type="number" value="1" min="1">

<button class="add-btn"
onclick="addToCart('Slime Tops',35,'size2','color2','qty2')">
Add to Cart
</button>

</div>
</div>

</section>

<!-- CART -->

<div class="cart-panel" id="cartPanel">

<div class="cart-header">

<h2>Your Cart</h2>

<div class="close-cart" onclick="toggleCart()">
<i class="fa-solid fa-xmark"></i>
</div>

</div>

<div id="cartItems"></div>

<h3>Total: $<span id="cartTotal">0</span></h3>

<button onclick="toggleCart()" style="
width:100%;
padding:14px;
margin-top:15px;
background:#111;
color:white;
border:none;
border-radius:30px;
font-weight:600;
cursor:pointer;
">
Checkout Now
</button>

<div id="paypal-button-container"></div>

</div>

<footer>

<div class="footer-icons">

<i class="fab fa-tiktok"></i>
<i class="fab fa-instagram"></i>
<i class="fab fa-x-twitter"></i>
<i class="fab fa-youtube"></i>
<i class="fab fa-spotify"></i>
  
</div>

<div class="footer-links">
<a href="/terms/">Terms</a>
<a href="/privacy/">Privacy</a>
  
</div>

<p>© 2026 Shinobi Slime</p>

</footer>

<script>

emailjs.init("cWjxMWojgWAjFZKey")

let cart=[]
let total=0

function addToCart(name,price,sizeId,colorId,qtyId){

let size=document.getElementById(sizeId).value
let color=document.getElementById(colorId).value
let qty=parseInt(document.getElementById(qtyId).value)

if(!qty || qty<1){
qty=1
}

cart.push({name,price,size,color,qty})

total+=price*qty

updateCart()

toggleCart()

}

function updateCart(){

const list=document.getElementById("cartItems")

list.innerHTML=""

cart.forEach((item,index)=>{

list.innerHTML+=`

<div class="cart-item">

<div>
${item.name}<br>
${item.size} / ${item.color} x${item.qty}
</div>

<div>
$${item.price*item.qty}
<span class="remove" onclick="removeItem(${index})">✕</span>
</div>

</div>

`

})

// ✅ update total
document.getElementById("cartTotal").innerText=total.toFixed(2)

// ✅ update cart count badge
let count = cart.reduce((sum,item)=>sum+item.qty,0)
let badge = document.getElementById("cartCount")

badge.innerText = count

if(count > 0){
badge.style.display = "block"
}else{
badge.style.display = "none"
}

}

function removeItem(index){

total-=cart[index].price*cart[index].qty

cart.splice(index,1)

updateCart()

}

function toggleCart(){
document.getElementById("cartPanel").classList.toggle("active")
}

function openMenu(){
document.getElementById("menu").classList.add("active")
}

function closeMenu(){
document.getElementById("menu").classList.remove("active")
}

paypal.Buttons({

createOrder: function(data, actions) {

if(total<=0){
alert("Your cart is empty")
return
}

return actions.order.create({
purchase_units: [{
amount: {
value: total.toFixed(2)
}
}]
});

},

onApprove: function(data, actions) {

return actions.order.capture().then(function(details) {

emailjs.send("service_2fq9mpe","template_3hewnbw",{
customer: details.payer.name.given_name,
amount: total
})

alert("Payment successful!")

cart=[]
total=0
updateCart()

});

}

}).render('#paypal-button-container');

</script>

</body>
</html>
