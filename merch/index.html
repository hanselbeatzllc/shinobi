<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Merch | Shinobi</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#0b0b0b;
color:white;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(12px);
z-index:1000;
}

.logo{
font-size:22px;
font-weight:800;
letter-spacing:2px;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav ul li a{
text-decoration:none;
color:white;
font-size:14px;
}

nav ul li a:hover{
color:#8a5cff;
}

.menu-toggle{
display:none;
font-size:26px;
cursor:pointer;
}

/* CART ICON */

.cart-icon{
cursor:pointer;
position:relative;
font-size:20px;
}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
background:#8a5cff;
font-size:11px;
padding:3px 6px;
border-radius:50%;
}

/* HEADER */

.header{
padding-top:140px;
padding-bottom:40px;
text-align:center;
}

.header h1{
font-size:60px;
letter-spacing:4px;
}

.header p{
color:#aaa;
margin-top:10px;
}

/* FILTERS */

.filters{
display:flex;
gap:20px;
justify-content:center;
margin-bottom:40px;
flex-wrap:wrap;
}

.filters input,
.filters select{
padding:10px 16px;
border-radius:20px;
border:none;
background:#111;
color:white;
}

/* PRODUCTS */

.products{
padding:0 10% 100px 10%;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;
}

.product{
background:#111;
border-radius:12px;
overflow:hidden;
transition:.3s;
}

.product:hover{
transform:translateY(-6px);
background:#151515;
}

.product img{
width:100%;
height:260px;
object-fit:cover;
}

.product-info{
padding:20px;
}

.product-info h3{
margin-bottom:6px;
}

.price{
color:#8a5cff;
margin-bottom:10px;
}

.buy-btn{
padding:10px 18px;
border:none;
background:#8a5cff;
color:white;
border-radius:20px;
cursor:pointer;
font-size:13px;
}

.buy-btn:hover{
background:#a381ff;
}

/* DESKTOP */

@media(min-width:1000px){

.products{
grid-template-columns:repeat(4,1fr);
}

}

/* CART PANEL */

.cart-panel{
position:fixed;
right:-350px;
top:0;
width:350px;
height:100%;
background:#111;
padding:30px;
transition:.4s;
z-index:2000;
}

.cart-panel.active{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:12px;
font-size:14px;
}

.checkout-btn{
margin-top:20px;
padding:12px;
background:#8a5cff;
border:none;
width:100%;
border-radius:20px;
color:white;
cursor:pointer;
}

/* FOOTER */

footer{
background:#050505;
padding:60px 10%;
}

.footer-grid{
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
}

.socials{
display:flex;
gap:20px;
}

.socials a{
font-size:22px;
color:white;
opacity:.7;
}

.socials a:hover{
color:#8a5cff;
opacity:1;
}

.copyright{
text-align:right;
font-size:13px;
color:#777;
}

/* MOBILE */

@media(max-width:900px){

nav ul{
position:fixed;
top:70px;
left:-100%;
flex-direction:column;
background:black;
width:100%;
padding:40px;
transition:.4s;
gap:20px;
}

nav ul.active{
left:0;
}

.menu-toggle{
display:block;
}

.header h1{
font-size:40px;
}

.footer-grid{
grid-template-columns:1fr;
text-align:center;
gap:20px;
}

.copyright{
text-align:center;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">Shinobi</div>

<div style="display:flex;gap:20px;align-items:center">

<div class="cart-icon" onclick="toggleCart()">
<i class="fa-solid fa-shopping-cart"></i>
<span class="cart-count" id="cartCount">0</span>
</div>

<div class="menu-toggle" id="menuToggle">
<i class="fa-solid fa-bars"></i>
</div>

</div>

<ul id="navLinks">

<li><a href="../">Home</a></li>
<li><a href="../music/">Music</a></li>
<li><a href="../videos/">Videos</a></li>
<li><a href="../tour/">Tour</a></li>
<li><a href="../merch/">Merch</a></li>
<li><a href="../about/">About</a></li>
<li><a href="../contact/">Contact</a></li>

</ul>

</nav>


<section class="header">

<h1>MERCH</h1>
<p>Official artist merchandise</p>

</section>


<div class="filters">

<input id="searchProduct" placeholder="Search merch">

<select id="categoryFilter">
<option value="">All Categories</option>
<option value="hoodie">Hoodies</option>
<option value="shirt">Shirts</option>
<option value="vinyl">Vinyl</option>
<option value="accessory">Accessories</option>
</select>

</div>


<section class="products" id="products">


<div class="product" data-name="Artist Hoodie" data-category="hoodie">

<img src="https://picsum.photos/400?1">

<div class="product-info">

<h3>Artist Hoodie</h3>
<div class="price">$65</div>

<button class="buy-btn" onclick="addToCart('Artist Hoodie','$65')">
Add to Cart
</button>

</div>

</div>


<div class="product" data-name="Tour Shirt" data-category="shirt">

<img src="https://picsum.photos/400?2">

<div class="product-info">

<h3>Tour Shirt</h3>
<div class="price">$35</div>

<button class="buy-btn" onclick="addToCart('Tour Shirt','$35')">
Add to Cart
</button>

</div>

</div>


<div class="product" data-name="Artist Hat" data-category="accessory">

<img src="https://picsum.photos/400?3">

<div class="product-info">

<h3>Artist Hat</h3>
<div class="price">$25</div>

<button class="buy-btn" onclick="addToCart('Artist Hat','$25')">
Add to Cart
</button>

</div>

</div>


<div class="product" data-name="Limited Vinyl" data-category="vinyl">

<img src="https://picsum.photos/400?4">

<div class="product-info">

<h3>Limited Vinyl</h3>
<div class="price">$40</div>

<button class="buy-btn" onclick="addToCart('Limited Vinyl','$40')">
Add to Cart
</button>

</div>

</div>


</section>


<div class="cart-panel" id="cartPanel">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<button class="checkout-btn">
Checkout
</button>

</div>


<footer>

<div class="footer-grid">

<div>

<div class="socials">

<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-x-twitter"></i></a>
<a href="#"><i class="fab fa-youtube"></i></a>
<a href="#"><i class="fab fa-spotify"></i></a>

</div>

</div>

<div class="copyright">

© 2026 Shinobi Slime  
All Rights Reserved

</div>

</div>

</footer>


<script>

/* MOBILE MENU */

const toggle=document.getElementById("menuToggle")
const nav=document.getElementById("navLinks")

toggle.onclick=()=>nav.classList.toggle("active")

/* CART */

let cart=[]

function addToCart(name,price){

cart.push({name,price})

updateCart()

}

function updateCart(){

const list=document.getElementById("cartItems")
list.innerHTML=""

cart.forEach((item,index)=>{

list.innerHTML+=`
<div class="cart-item">
${item.name} - ${item.price}
<span onclick="removeItem(${index})" style="cursor:pointer">✕</span>
</div>
`

})

document.getElementById("cartCount").textContent=cart.length

}

function removeItem(index){

cart.splice(index,1)
updateCart()

}

function toggleCart(){

document.getElementById("cartPanel").classList.toggle("active")

}

/* FILTER */

const search=document.getElementById("searchProduct")
const category=document.getElementById("categoryFilter")

function filterProducts(){

const text=search.value.toLowerCase()
const cat=category.value

document.querySelectorAll(".product").forEach(p=>{

const name=p.dataset.name.toLowerCase()
const categoryMatch=cat===""||p.dataset.category===cat

p.style.display=(name.includes(text)&&categoryMatch)?"block":"none"

})

}

search.addEventListener("input",filterProducts)
category.addEventListener("change",filterProducts)

</script>

</body>
</html>
