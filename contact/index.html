<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Shinobi</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#f4f4f4;
color:#111;
overflow-x:hidden;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:#d81b60;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:800;
color:white;
text-decoration:none;
}

.menu-toggle{
font-size:28px;
color:white;
cursor:pointer;
}

/* FULL MENU */

.menu{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#d81b60;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:30px;
transform:translateY(-100%);
transition:.4s;
z-index:2000;
}

.menu.active{
transform:translateY(0);
}

.menu a{
color:white;
font-size:28px;
text-decoration:none;
font-weight:700;
}

.menu .close{
position:absolute;
top:25px;
right:30px;
font-size:32px;
cursor:pointer;
}

/* HEADER */

.header{
padding-top:140px;
text-align:center;
padding-bottom:60px;
}

.header h1{
font-size:50px;
color:#d81b60;
}

.header p{
color:#666;
}

/* SECTION */

.section{
max-width:1000px;
margin:auto;
padding:0 20px 100px 20px;
}

/* CARD */

.card{
background:white;
padding:40px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
margin-bottom:40px;
}

.card h2{
color:#d81b60;
margin-bottom:20px;
}

/* INPUTS */

input,textarea,select{
width:100%;
padding:14px;
border:none;
background:#eee;
border-radius:30px;
margin-bottom:12px;
}

textarea{
border-radius:16px;
min-height:120px;
}

/* BUTTON */

button{
padding:14px 28px;
border:none;
background:#d81b60;
color:white;
border-radius:30px;
cursor:pointer;
font-weight:600;
}

/* SOCIAL BUTTONS */

.social-cta{
display:flex;
gap:20px;
margin-top:20px;
}

.social-btn{
padding:14px 26px;
border-radius:30px;
color:white;
text-decoration:none;
font-weight:600;
}

.spotify{background:#1db954;}
.instagram{background:#E1306C;}

/* FOOTER */

footer{
background:#d81b60;
padding:60px 20px;
text-align:center;
color:white;
}

.footer-icons{
display:flex;
justify-content:center;
gap:26px;
font-size:22px;
margin-bottom:20px;
}

.footer-links{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:10px;
}

.footer-links a{
color:white;
text-decoration:none;
}

.footer-copy{
font-size:13px;
}

</style>

</head>

<body>


<nav>

<a href="../" class="logo">Shinobi</a>

<div class="menu-toggle" id="openMenu">
<i class="fa-solid fa-bars"></i>
</div>

</nav>


<div class="menu" id="menu">

<div class="close" id="closeMenu">
<i class="fa-solid fa-xmark"></i>
</div>

<a href="../music/">Music</a>
<a href="../videos/">Videos</a>
<a href="../tour/">Tour</a>
<a href="../merch/">Shop</a>
<a href="../contact/">Sign Up</a>

<div class="footer-icons">

<i class="fab fa-tiktok"></i>
<i class="fab fa-instagram"></i>
<i class="fab fa-x-twitter"></i>
<i class="fab fa-facebook"></i>
<i class="fab fa-youtube"></i>
<i class="fab fa-spotify"></i>
<i class="fab fa-apple"></i>

</div>
  
</div>

<section class="header">

<h1>CONTACT</h1>
<p>Bookings, press & fan updates</p>

</section>


<section class="section">


<!-- FAN DATABASE -->

<div class="card">

<h2>Join the Fan List</h2>

<form id="fanForm">

<input type="email" id="fanEmail" placeholder="Your email" required>

<button type="submit">Subscribe</button>

</form>

</div>



<!-- BOOKING CRM -->

<div class="card">

<h2>Promoter Booking Request</h2>

<form id="bookingForm">

<input type="text" id="promoter" placeholder="Promoter Name" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="text" id="venue" placeholder="City / Venue" required>

<select id="eventType">

<option value="">Event Type</option>
<option>Festival</option>
<option>Club Show</option>
<option>Private Event</option>

</select>

<input type="number" id="budget" placeholder="Event Budget ($)" required>

<input type="file" id="contract">

<textarea id="details" placeholder="Event Details"></textarea>

<button type="submit">Send Booking Request</button>

</form>

</div>



<!-- FOLLOW -->

<div class="card">

<h2>Follow Shinobi</h2>

<div class="social-cta">

<a class="social-btn spotify"
href="https://open.spotify.com"
target="_blank">

<i class="fab fa-spotify"></i>
Follow on Spotify

</a>

<a class="social-btn instagram"
href="https://instagram.com"
target="_blank">

<i class="fab fa-instagram"></i>
DM on Instagram

</a>

</div>

</div>


</section>


<footer>

<div class="footer-icons">

<i class="fab fa-tiktok"></i>
<i class="fab fa-instagram"></i>
<i class="fab fa-x-twitter"></i>
<i class="fab fa-facebook"></i>
<i class="fab fa-youtube"></i>
<i class="fab fa-spotify"></i>
<i class="fab fa-apple"></i>

</div>

<div class="footer-links">

<a href="#">Terms</a>
<a href="#">Privacy</a>

</div>

<div class="footer-copy">

© 2026 Shinobi Slime

</div>

</footer>


<script type="module">

/* MENU */

const open=document.getElementById("openMenu")
const close=document.getElementById("closeMenu")
const menu=document.getElementById("menu")

open.onclick=()=>menu.classList.add("active")
close.onclick=()=>menu.classList.remove("active")

/* FIREBASE */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyDy_97tXbusM41DKQh8-I9kUUKShn6s9hM",
authDomain: "shinobi-merch.firebaseapp.com",
projectId: "shinobi-merch",
storageBucket: "shinobi-merch.firebasestorage.app",
messagingSenderId: "142889938049",
appId: "1:142889938049:web:61f3b6403a1a8e8daff180"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* FAN EMAIL DATABASE */

document.getElementById("fanForm").addEventListener("submit",async e=>{

e.preventDefault()

const email=document.getElementById("fanEmail").value

await addDoc(collection(db,"fans"),{

email:email,
date:Date.now()

})

alert("You joined the fan list!")

})

/* BOOKING CRM */

document.getElementById("bookingForm").addEventListener("submit",async e=>{

e.preventDefault()

const promoter=document.getElementById("promoter").value
const email=document.getElementById("email").value
const venue=document.getElementById("venue").value
const type=document.getElementById("eventType").value
const budget=document.getElementById("budget").value
const details=document.getElementById("details").value

const file=document.getElementById("contract").files[0]

let fileURL=""

if(file){

const storageRef=ref(storage,"contracts/"+file.name)

await uploadBytes(storageRef,file)

fileURL=file.name

}

await addDoc(collection(db,"booking_requests"),{

promoter,
email,
venue,
type,
budget,
details,
contract:fileURL,
date:Date.now()

})

alert("Booking request submitted!")

})

</script>


</body>
</html>
