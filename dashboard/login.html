<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shinobi Admin Login</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
width:320px;
}

h2{
color:#d81b60;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
background:#d81b60;
border:none;
color:white;
border-radius:30px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Admin Login</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyDy_97tXbusM41DKQh8-I9kUUKShn6s9hM",
authDomain: "shinobi-merch.firebaseapp.com",
projectId: "shinobi-merch",
storageBucket: "shinobi-merch.firebasestorage.app",
messagingSenderId: "142889938049",
appId: "1:142889938049:web:61f3b6403a1a8e8daff180"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.login = function(){

const email=document.getElementById("email").value

const password=document.getElementById("password").value

signInWithEmailAndPassword(auth,email,password)
.then(()=>{

window.location="index.html"

})
.catch(()=>{

alert("Login failed")

})

}

</script>

</body>
</html>
