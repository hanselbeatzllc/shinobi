<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shinobi Dashboard</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d81b60">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#d81b60;
color:white;
height:100vh;
padding:30px;
display:flex;
flex-direction:column;
gap:18px;
}

.sidebar button{
padding:12px;
border:none;
border-radius:30px;
background:white;
color:#d81b60;
font-weight:bold;
cursor:pointer;
}

/* MOBILE */

@media(max-width:900px){

body{flex-direction:column}

.sidebar{
width:100%;
height:auto;
flex-wrap:wrap;
flex-direction:row;
}

.sidebar button{
flex:1 1 45%;
}

}

/* CONTENT */

.content{
flex:1;
padding:40px;
overflow:auto;
}

.page{display:none}
.page.active{display:block}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,.1);
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
}

.upload-item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

button.submit{
background:#d81b60;
color:white;
border:none;
padding:12px;
border-radius:30px;
cursor:pointer;
}

.delete{
background:#e53935;
color:white;
border:none;
padding:6px 12px;
border-radius:20px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Shinobi Admin</h2>

<button onclick="showPage('overview')">Overview</button>
<button onclick="showPage('bookings')">Booking Requests</button>
<button onclick="showPage('fans')">Fan Database</button>
<button onclick="showPage('musicUpload')">Upload Music</button>
<button onclick="showPage('videoUpload')">Upload Video</button>
<button onclick="showPage('merchUpload')">Upload Merch</button>
<button onclick="showPage('tourUpload')">Add Tour Date</button>
<button onclick="showPage('tickets')">Ticket Scanner</button>
<button onclick="showPage('crm')">Promoter CRM</button>

<button id="installApp" style="display:none">Install App</button>

<button onclick="logout()">Logout</button>

</div>

<div class="content">

<!-- OVERVIEW -->

<div id="overview" class="page active">
<div class="card">

<h2>Dashboard Overview</h2>

<p>Total Fans: <span id="fanCount">0</span></p>
<p>Total Booking Requests: <span id="bookingCount">0</span></p>

</div>
</div>


<!-- BOOKINGS -->

<div id="bookings" class="page">
<div class="card">

<h2>Booking Requests</h2>

<table>
<thead>
<tr>
<th>Promoter</th>
<th>Email</th>
<th>Venue</th>
<th>Budget</th>
</tr>
</thead>

<tbody id="bookingTable"></tbody>

</table>

</div>
</div>


<!-- FANS -->

<div id="fans" class="page">
<div class="card">

<h2>Fan Emails</h2>

<table>
<thead>
<tr>
<th>Email</th>
<th>Date</th>
</tr>
</thead>

<tbody id="fanTable"></tbody>

</table>

</div>
</div>


<!-- MUSIC -->

<div id="musicUpload" class="page">
<div class="card">

<h2>Upload Music</h2>

<input id="musicTitle" placeholder="Song Title">
<input id="musicCover" placeholder="Cover Image">
<input id="musicLink" placeholder="Streaming Link">

<button class="submit" onclick="uploadMusic()">Upload</button>

<div id="musicList"></div>

</div>
</div>


<!-- VIDEO -->

<div id="videoUpload" class="page">
<div class="card">

<h2>Upload Video</h2>

<input id="videoTitle" placeholder="Video Title">
<input id="videoLink" placeholder="YouTube URL">

<button class="submit" onclick="uploadVideo()">Upload</button>

<div id="videoList"></div>

</div>
</div>


<!-- MERCH -->

<div id="merchUpload" class="page">
<div class="card">

<h2>Upload Merch</h2>

<input id="merchName" placeholder="Product Name">
<input id="merchPrice" placeholder="Price">
<input id="merchImage" placeholder="Image URL">
<input id="merchStock" placeholder="Inventory">

<button class="submit" onclick="uploadMerch()">Upload</button>

<div id="merchList"></div>

</div>
</div>


<!-- TOUR -->

<div id="tourUpload" class="page">
<div class="card">

<h2>Add Tour Date</h2>

<input id="tourCity" placeholder="City">
<input id="tourVenue" placeholder="Venue">
<input id="tourDate" type="date">
<input id="tourTicket" placeholder="Ticket Link">

<button class="submit" onclick="uploadTour()">Add Tour</button>

<div id="tourList"></div>

</div>
</div>


<!-- TICKET SCANNER -->

<div id="tickets" class="page">
<div class="card">

<h2>Ticket Scanner</h2>

<input id="ticketCode" placeholder="Scan ticket code">

<button onclick="scanTicket()">Validate Ticket</button>

<div id="ticketResult"></div>

</div>
</div>


<!-- PROMOTER CRM -->

<div id="crm" class="page">
<div class="card">

<h2>Promoter CRM</h2>

<div id="crmList"></div>

</div>
</div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyDy_97tXbusM41DKQh8-I9kUUKShn6s9hM",
authDomain:"shinobi-merch.firebaseapp.com",
projectId:"shinobi-merch",
storageBucket:"shinobi-merch.firebasestorage.app",
messagingSenderId:"142889938049",
appId:"1:142889938049:web:61f3b6403a1a8e8daff180"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)
const auth=getAuth(app)



/* PAGE SWITCH */

window.showPage=function(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(page).classList.add("active")
}



/* LOGOUT */

window.logout=function(){
signOut(auth)
}



/* BOOKINGS */

onSnapshot(collection(db,"booking_requests"),snap=>{

bookingCount.innerText=snap.size

const table=document.getElementById("bookingTable")
table.innerHTML=""

snap.forEach(d=>{

const data=d.data()

table.innerHTML+=`
<tr>
<td>${data.promoter}</td>
<td>${data.email}</td>
<td>${data.venue}</td>
<td>$${data.budget}</td>
</tr>
`

})

})



/* FANS FIX */

onSnapshot(collection(db,"fans"),snap=>{

fanCount.innerText=snap.size

const table=document.getElementById("fanTable")
table.innerHTML=""

snap.forEach(d=>{

const data=d.data()

table.innerHTML+=`
<tr>
<td>${data.email}</td>
<td>${new Date(data.date).toLocaleDateString()}</td>
</tr>
`

})

})



/* VIDEOS FIX */

onSnapshot(collection(db,"videos"),snap=>{

const list=document.getElementById("videoList")
list.innerHTML=""

snap.forEach(d=>{

const data=d.data()

list.innerHTML+=`
<div class="upload-item">
${data.title}
<button class="delete" onclick="deleteItem('videos','${d.id}')">Delete</button>
</div>
`

})

})



/* MUSIC */

onSnapshot(collection(db,"music"),snap=>{

const list=document.getElementById("musicList")
list.innerHTML=""

snap.forEach(d=>{

const data=d.data()

list.innerHTML+=`
<div class="upload-item">
${data.title}
<button class="delete" onclick="deleteItem('music','${d.id}')">Delete</button>
</div>
`

})

})



/* MERCH + INVENTORY */

onSnapshot(collection(db,"merch"),snap=>{

const list=document.getElementById("merchList")
list.innerHTML=""

snap.forEach(d=>{

const data=d.data()

list.innerHTML+=`
<div class="upload-item">
${data.name} - Stock:${data.stock}
<button class="delete" onclick="deleteItem('merch','${d.id}')">Delete</button>
</div>
`

})

})



/* TOUR */

onSnapshot(collection(db,"tour"),snap=>{

const list=document.getElementById("tourList")
list.innerHTML=""

snap.forEach(d=>{

const data=d.data()

list.innerHTML+=`
<div class="upload-item">
${data.city} - ${data.venue}
<button class="delete" onclick="deleteItem('tour','${d.id}')">Delete</button>
</div>
`

})

})



/* DELETE */

window.deleteItem=async function(col,id){
await deleteDoc(doc(db,col,id))
}



/* UPLOAD FUNCTIONS */

window.uploadMusic=async()=>{
await addDoc(collection(db,"music"),{
title:musicTitle.value,
cover:musicCover.value,
link:musicLink.value
})
}

window.uploadVideo=async()=>{
await addDoc(collection(db,"videos"),{
title:videoTitle.value,
youtube:videoLink.value
})
}

window.uploadMerch=async()=>{
await addDoc(collection(db,"merch"),{
name:merchName.value,
price:merchPrice.value,
image:merchImage.value,
stock:merchStock.value
})
}

window.uploadTour=async()=>{
await addDoc(collection(db,"tour"),{
city:tourCity.value,
venue:tourVenue.value,
date:tourDate.value,
ticket:tourTicket.value
})
}



/* TICKET SCANNER */

window.scanTicket=function(){

const code=document.getElementById("ticketCode").value

if(code==="VIP123"){
ticketResult.innerText="VALID TICKET"
}else{
ticketResult.innerText="INVALID"
}

}



/* PROMOTER CRM */

onSnapshot(collection(db,"booking_requests"),snap=>{

const list=document.getElementById("crmList")
list.innerHTML=""

snap.forEach(d=>{

const data=d.data()

list.innerHTML+=`
<div class="upload-item">
${data.promoter} - ${data.email}
</div>
`

})

})



/* PWA */

let deferredPrompt
const installBtn=document.getElementById("installApp")

window.addEventListener("beforeinstallprompt",e=>{
e.preventDefault()
deferredPrompt=e
installBtn.style.display="block"
})

installBtn.onclick=async()=>{
installBtn.style.display="none"
deferredPrompt.prompt()
await deferredPrompt.userChoice
deferredPrompt=null
}



/* SERVICE WORKER */

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

</script>

</body>
</html>
