<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shinobi Dahboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#d81b60;
color:white;
height:100vh;
padding:30px;
display:flex;
flex-direction:column;
gap:18px;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar button{
padding:12px;
border:none;
border-radius:30px;
background:white;
color:#d81b60;
font-weight:bold;
cursor:pointer;
}

.sidebar .logout{
margin-top:auto;
background:#e53935;
color:white;
}

/* CONTENT */

.content{
flex:1;
padding:40px;
overflow:auto;
}

.page{
display:none;
}

.page.active{
display:block;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,.1);
margin-bottom:30px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
}

.approve{
background:#1db954;
color:white;
border:none;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

.reject{
background:#e53935;
color:white;
border:none;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

.reply{
background:#d81b60;
color:white;
border:none;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

/* FORMS */

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ddd;
}

button.submit{
background:#d81b60;
color:white;
border:none;
padding:12px;
border-radius:30px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Shinobi Admin</h2>

<button onclick="showPage('overview')">Overview</button>
<button onclick="showPage('bookings')">Booking Requests</button>
<button onclick="showPage('fans')">Fan Database</button>
<button onclick="showPage('musicUpload')">Upload Music</button>
<button onclick="showPage('videoUpload')">Upload Video</button>
<button onclick="showPage('merchUpload')">Upload Merch</button>
<button onclick="showPage('tourUpload')">Add Tour Date</button>

<button class="logout" onclick="logout()">Logout</button>

</div>

<!-- CONTENT -->

<div class="content">

<!-- OVERVIEW -->

<div id="overview" class="page active">

<div class="card">

<h2>Dashboard Overview</h2>

<p>Total Fans: <span id="fanCount">0</span></p>
<p>Total Booking Requests: <span id="bookingCount">0</span></p>

</div>

</div>

<!-- BOOKINGS -->

<div id="bookings" class="page">

<div class="card">

<h2>Booking Requests</h2>

<table>

<thead>

<tr>
<th>Promoter</th>
<th>Email</th>
<th>Venue</th>
<th>Budget</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="bookingTable"></tbody>

</table>

</div>

</div>

<!-- FAN DATABASE -->

<div id="fans" class="page">

<div class="card">

<h2>Fan Emails</h2>

<table>

<thead>

<tr>
<th>Email</th>
<th>Date</th>
</tr>

</thead>

<tbody id="fanTable"></tbody>

</table>

</div>

</div>

<!-- MUSIC UPLOAD -->

<div id="musicUpload" class="page">

<div class="card">

<h2>Upload Music</h2>

<input id="musicTitle" placeholder="Song Title">
<input id="musicCover" placeholder="Cover Image URL">
<input id="musicLink" placeholder="Streaming Link">

<button class="submit" onclick="uploadMusic()">Upload</button>

</div>

</div>

<!-- VIDEO UPLOAD -->

<div id="videoUpload" class="page">

<div class="card">

<h2>Upload Video</h2>

<input id="videoTitle" placeholder="Video Title">
<input id="videoLink" placeholder="YouTube URL">

<button class="submit" onclick="uploadVideo()">Upload</button>

</div>

</div>

<!-- MERCH UPLOAD -->

<div id="merchUpload" class="page">

<div class="card">

<h2>Upload Merch</h2>

<input id="merchName" placeholder="Product Name">
<input id="merchPrice" placeholder="Price">
<input id="merchImage" placeholder="Image URL">

<button class="submit" onclick="uploadMerch()">Upload</button>

</div>

</div>

<!-- TOUR UPLOAD -->

<div id="tourUpload" class="page">

<div class="card">

<h2>Add Tour Date</h2>

<input id="tourCity" placeholder="City">
<input id="tourVenue" placeholder="Venue">
<input id="tourDate" type="date">
<input id="tourTicket" placeholder="Ticket Link">

<button class="submit" onclick="uploadTour()">Add Tour</button>

</div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
updateDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


const firebaseConfig = {

apiKey:"AIzaSyDy_97tXbusM41DKQh8-I9kUUKShn6s9hM",
authDomain:"shinobi-merch.firebaseapp.com",
projectId:"shinobi-merch",
storageBucket:"shinobi-merch.firebasestorage.app",
messagingSenderId:"142889938049",
appId:"1:142889938049:web:61f3b6403a1a8e8daff180"

}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)
const auth=getAuth(app)


/* AUTH */

onAuthStateChanged(auth,user=>{

if(!user){
window.location="login.html"
}

})


/* PAGE SWITCH */

window.showPage=function(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(page).classList.add("active")

}


/* LOGOUT */

window.logout=function(){

signOut(auth)

}


/* LIVE BOOKINGS */

onSnapshot(collection(db,"booking_requests"),snapshot=>{

const table=document.getElementById("bookingTable")

table.innerHTML=""

document.getElementById("bookingCount").innerText=snapshot.size

snapshot.forEach(docData=>{

const d=docData.data()

const status=d.status || "pending"

table.innerHTML+=`

<tr>

<td>${d.promoter}</td>
<td>${d.email}</td>
<td>${d.venue}</td>
<td>$${d.budget}</td>

<td>

${status==="pending" ? `

<button class="approve" onclick="approve('${docData.id}')">Approve</button>
<button class="reject" onclick="reject('${docData.id}')">Reject</button>

` : status}

<button class="reply" onclick="reply('${d.email}')">Reply</button>

</td>

</tr>

`

})

})


/* LIVE FANS */

onSnapshot(collection(db,"fans"),snapshot=>{

const table=document.getElementById("fanTable")

table.innerHTML=""

document.getElementById("fanCount").innerText=snapshot.size

snapshot.forEach(docData=>{

const d=docData.data()

table.innerHTML+=`

<tr>

<td>${d.email}</td>
<td>${new Date(d.date).toLocaleDateString()}</td>

</tr>

`

})

})


/* APPROVE */

window.approve=async function(id){

await updateDoc(doc(db,"booking_requests",id),{
status:"approved"
})

}


/* REJECT */

window.reject=async function(id){

await updateDoc(doc(db,"booking_requests",id),{
status:"rejected"
})

}


/* REPLY */

window.reply=function(email){

window.location="mailto:"+email

}


/* UPLOAD MUSIC */

window.uploadMusic=async function(){

await addDoc(collection(db,"music"),{

title:musicTitle.value,
cover:musicCover.value,
link:musicLink.value

})

alert("Music uploaded")

}


/* UPLOAD VIDEO */

window.uploadVideo=async function(){

await addDoc(collection(db,"videos"),{

title:videoTitle.value,
youtube:videoLink.value

})

alert("Video uploaded")

}


/* UPLOAD MERCH */

window.uploadMerch=async function(){

await addDoc(collection(db,"merch"),{

name:merchName.value,
price:merchPrice.value,
image:merchImage.value

})

alert("Merch uploaded")

}


/* UPLOAD TOUR */

window.uploadTour=async function(){

await addDoc(collection(db,"tour"),{

city:tourCity.value,
venue:tourVenue.value,
date:tourDate.value,
ticket:tourTicket.value

})

alert("Tour added")

}

</script>

</body>
</html>
