<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shinobi Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#d81b60;
color:white;
height:100vh;
padding:30px;
display:flex;
flex-direction:column;
gap:18px;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar button{
padding:12px;
border:none;
border-radius:30px;
background:white;
color:#d81b60;
font-weight:bold;
cursor:pointer;
}

.sidebar .logout{
margin-top:auto;
background:#e53935;
color:white;
}

/* CONTENT */

.content{
flex:1;
padding:40px;
overflow:auto;
}

.page{
display:none;
}

.page.active{
display:block;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,.1);
margin-bottom:30px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
}

.approve{
background:#1db954;
color:white;
border:none;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

.reject{
background:#e53935;
color:white;
border:none;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

.reply{
background:#d81b60;
color:white;
border:none;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

.edit{
background:#2196f3;
color:white;
border:none;
padding:6px 10px;
border-radius:20px;
cursor:pointer;
}

.delete{
background:#e53935;
color:white;
border:none;
padding:6px 10px;
border-radius:20px;
cursor:pointer;
}

/* FORMS */

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ddd;
}

button.submit{
background:#d81b60;
color:white;
border:none;
padding:12px;
border-radius:30px;
cursor:pointer;
}

.status{
margin-top:10px;
font-weight:bold;
}

.upload-list{
margin-top:20px;
}

.upload-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Shinobi Admin</h2>

<button onclick="showPage('overview')">Overview</button>
<button onclick="showPage('bookings')">Booking Requests</button>
<button onclick="showPage('fans')">Fan Database</button>
<button onclick="showPage('musicUpload')">Upload Music</button>
<button onclick="showPage('videoUpload')">Upload Video</button>
<button onclick="showPage('merchUpload')">Upload Merch</button>
<button onclick="showPage('tourUpload')">Add Tour Date</button>

<button class="logout" onclick="logout()">Logout</button>

</div>


<div class="content">

<!-- OVERVIEW -->

<div id="overview" class="page active">

<div class="card">

<h2>Dashboard Overview</h2>

<p>Total Fans: <span id="fanCount">0</span></p>
<p>Total Booking Requests: <span id="bookingCount">0</span></p>

</div>

</div>

<!-- BOOKINGS -->

<div id="bookings" class="page">

<div class="card">

<h2>Booking Requests</h2>

<table>

<thead>
<tr>
<th>Promoter</th>
<th>Email</th>
<th>Venue</th>
<th>Budget</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="bookingTable"></tbody>

</table>

</div>

</div>

<!-- FANS -->

<div id="fans" class="page">

<div class="card">

<h2>Fan Emails</h2>

<table>

<thead>
<tr>
<th>Email</th>
<th>Date</th>
</tr>
</thead>

<tbody id="fanTable"></tbody>

</table>

</div>

</div>

<!-- MUSIC -->

<div id="musicUpload" class="page">

<div class="card">

<h2>Upload Music</h2>

<input id="musicTitle" placeholder="Song Title">
<input id="musicCover" placeholder="Cover Image URL">
<input id="musicLink" placeholder="Streaming Link">

<button id="musicBtn" class="submit" onclick="uploadMusic()">Upload</button>

<div id="musicStatus" class="status"></div>

<div class="upload-list" id="musicList"></div>

</div>

</div>

<!-- VIDEO -->

<div id="videoUpload" class="page">

<div class="card">

<h2>Upload Video</h2>

<input id="videoTitle" placeholder="Video Title">
<input id="videoLink" placeholder="YouTube URL">

<button id="videoBtn" class="submit" onclick="uploadVideo()">Upload</button>

<div id="videoStatus" class="status"></div>

<div class="upload-list" id="videoList"></div>

</div>

</div>

<!-- MERCH -->

<div id="merchUpload" class="page">

<div class="card">

<h2>Upload Merch</h2>

<input id="merchName" placeholder="Product Name">
<input id="merchPrice" placeholder="Price">
<input id="merchImage" placeholder="Image URL">

<button id="merchBtn" class="submit" onclick="uploadMerch()">Upload</button>

<div id="merchStatus" class="status"></div>

<div class="upload-list" id="merchList"></div>

</div>

</div>

<!-- TOUR -->

<div id="tourUpload" class="page">

<div class="card">

<h2>Add Tour Date</h2>

<input id="tourCity" placeholder="City">
<input id="tourVenue" placeholder="Venue">
<input id="tourDate" type="date">
<input id="tourTicket" placeholder="Ticket Link">

<button id="tourBtn" class="submit" onclick="uploadTour()">Add Tour</button>

<div id="tourStatus" class="status"></div>

<div class="upload-list" id="tourList"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
updateDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


const firebaseConfig = {

apiKey:"AIzaSyDy_97tXbusM41DKQh8-I9kUUKShn6s9hM",
authDomain:"shinobi-merch.firebaseapp.com",
projectId:"shinobi-merch",
storageBucket:"shinobi-merch.firebasestorage.app",
messagingSenderId:"142889938049",
appId:"1:142889938049:web:61f3b6403a1a8e8daff180"

}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)
const auth=getAuth(app)


/* PAGE SWITCH */

window.showPage=function(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(page).classList.add("active")

}


/* LOGOUT */

window.logout=function(){

signOut(auth)

}


/* BOOKINGS LIVE */

onSnapshot(collection(db,"booking_requests"),snapshot=>{

const table=document.getElementById("bookingTable")

table.innerHTML=""

document.getElementById("bookingCount").innerText=snapshot.size

snapshot.forEach(d=>{

const data=d.data()
const status=data.status||"pending"

table.innerHTML+=`

<tr>

<td>${data.promoter}</td>
<td>${data.email}</td>
<td>${data.venue}</td>
<td>$${data.budget}</td>

<td>

${status==="pending"?`

<button class="approve" onclick="approve('${d.id}')">Approve</button>
<button class="reject" onclick="reject('${d.id}')">Reject</button>

`:status}

<button class="reply" onclick="reply('${data.email}')">Reply</button>

</td>

</tr>

`

})

})


/* FANS */

onSnapshot(collection(db,"fans"),snapshot=>{

const table=document.getElementById("fanTable")

table.innerHTML=""

document.getElementById("fanCount").innerText=snapshot.size

snapshot.forEach(d=>{

const data=d.data()

table.innerHTML+=`

<tr>

<td>${data.email}</td>
<td>${new Date(data.date).toLocaleDateString()}</td>

</tr>

`

})

})


/* MUSIC */

onSnapshot(collection(db,"music"),snapshot=>{

const list=document.getElementById("musicList")
list.innerHTML=""

snapshot.forEach(d=>{

const data=d.data()

list.innerHTML+=`

<div class="upload-item">

${data.title}

<div>

<button class="delete" onclick="deleteItem('music','${d.id}')">Delete</button>

</div>

</div>

`

})

})


/* VIDEO */

onSnapshot(collection(db,"videos"),snapshot=>{

const list=document.getElementById("videoList")
list.innerHTML=""

snapshot.forEach(d=>{

const data=d.data()

list.innerHTML+=`

<div class="upload-item">

${data.title}

<div>

<button class="delete" onclick="deleteItem('videos','${d.id}')">Delete</button>

</div>

</div>

`

})

})


/* MERCH */

onSnapshot(collection(db,"merch"),snapshot=>{

const list=document.getElementById("merchList")
list.innerHTML=""

snapshot.forEach(d=>{

const data=d.data()

list.innerHTML+=`

<div class="upload-item">

${data.name} - $${data.price}

<div>

<button class="delete" onclick="deleteItem('merch','${d.id}')">Delete</button>

</div>

</div>

`

})

})


/* TOUR */

onSnapshot(collection(db,"tour"),snapshot=>{

const list=document.getElementById("tourList")
list.innerHTML=""

snapshot.forEach(d=>{

const data=d.data()

list.innerHTML+=`

<div class="upload-item">

${data.city} - ${data.venue}

<div>

<button class="delete" onclick="deleteItem('tour','${d.id}')">Delete</button>

</div>

</div>

`

})

})


/* DELETE */

window.deleteItem=async function(col,id){

await deleteDoc(doc(db,col,id))

}


/* UPLOAD MUSIC */

window.uploadMusic=async function(){

const btn=document.getElementById("musicBtn")
const status=document.getElementById("musicStatus")

btn.innerText="Uploading..."

await addDoc(collection(db,"music"),{

title:musicTitle.value,
cover:musicCover.value,
link:musicLink.value

})

status.innerText="Upload Finished ✓"

musicTitle.value=""
musicCover.value=""
musicLink.value=""

btn.innerText="Upload"

}


/* UPLOAD VIDEO */

window.uploadVideo=async function(){

const btn=document.getElementById("videoBtn")
const status=document.getElementById("videoStatus")

btn.innerText="Uploading..."

await addDoc(collection(db,"videos"),{

title:videoTitle.value,
youtube:videoLink.value

})

status.innerText="Upload Finished ✓"

videoTitle.value=""
videoLink.value=""

btn.innerText="Upload"

}


/* UPLOAD MERCH */

window.uploadMerch=async function(){

const btn=document.getElementById("merchBtn")
const status=document.getElementById("merchStatus")

btn.innerText="Uploading..."

await addDoc(collection(db,"merch"),{

name:merchName.value,
price:merchPrice.value,
image:merchImage.value

})

status.innerText="Upload Finished ✓"

merchName.value=""
merchPrice.value=""
merchImage.value=""

btn.innerText="Upload"

}


/* UPLOAD TOUR */

window.uploadTour=async function(){

const btn=document.getElementById("tourBtn")
const status=document.getElementById("tourStatus")

btn.innerText="Uploading..."

await addDoc(collection(db,"tour"),{

city:tourCity.value,
venue:tourVenue.value,
date:tourDate.value,
ticket:tourTicket.value

})

status.innerText="Upload Finished ✓"

tourCity.value=""
tourVenue.value=""
tourDate.value=""
tourTicket.value=""

btn.innerText="Add Tour"

}

</script>

</body>
</html>
