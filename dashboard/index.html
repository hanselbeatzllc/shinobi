<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shinobi Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

h1{
color:#d81b60;
}

.logout{
padding:10px 20px;
background:#e53935;
color:white;
border:none;
border-radius:30px;
cursor:pointer;
}

.card{
background:white;
padding:30px;
border-radius:10px;
margin-bottom:30px;
box-shadow:0 10px 20px rgba(0,0,0,.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

button{
padding:8px 14px;
border:none;
border-radius:20px;
cursor:pointer;
}

.approve{
background:#1db954;
color:white;
}

.reject{
background:#e53935;
color:white;
}

.reply{
background:#d81b60;
color:white;
}

.export{
margin-top:15px;
padding:10px 20px;
background:#d81b60;
color:white;
border:none;
border-radius:30px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<h1>Shinobi Management</h1>

<button class="logout" onclick="logout()">
Logout
</button>

</div>


<div class="card">

<h2>Booking Requests</h2>

<table id="bookingTable">

<thead>

<tr>
<th>Promoter</th>
<th>Email</th>
<th>Venue</th>
<th>Budget</th>
<th>Actions</th>
</tr>

</thead>

<tbody></tbody>

</table>

<button class="export" onclick="exportPromoters()">
Export Promoters CSV
</button>

</div>



<div class="card">

<h2>Fan Emails</h2>

<table id="fanTable">

<thead>

<tr>
<th>Email</th>
<th>Date</th>
</tr>

</thead>

<tbody></tbody>

</table>

<button class="export" onclick="exportFans()">
Export Fans CSV
</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
updateDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyDy_97tXbusM41DKQh8-I9kUUKShn6s9hM",
authDomain: "shinobi-merch.firebaseapp.com",
projectId: "shinobi-merch",
storageBucket: "shinobi-merch.firebasestorage.app",
messagingSenderId: "142889938049",
appId: "1:142889938049:web:61f3b6403a1a8e8daff180"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);


/* LOGIN PROTECTION */

onAuthStateChanged(auth,user=>{

if(!user){

window.location="login.html"

}

})


/* LOGOUT */

window.logout = function(){

signOut(auth).then(()=>{

window.location="login.html"

})

}


/* LOAD BOOKINGS */

const bookings = await getDocs(collection(db,"booking_requests"))

const bookingTable=document.querySelector("#bookingTable tbody")

bookings.forEach(docData=>{

const d=docData.data()

bookingTable.innerHTML+=`

<tr>

<td>${d.promoter}</td>
<td>${d.email}</td>
<td>${d.venue}</td>
<td>$${d.budget}</td>

<td>

<button class="approve" onclick="approve('${docData.id}')">
Approve
</button>

<button class="reject" onclick="reject('${docData.id}')">
Reject
</button>

<button class="reply" onclick="reply('${d.email}')">
Reply
</button>

</td>

</tr>

`

})


/* LOAD FAN EMAILS */

const fans=await getDocs(collection(db,"fans"))

const fanTable=document.querySelector("#fanTable tbody")

fans.forEach(docData=>{

const d=docData.data()

fanTable.innerHTML+=`

<tr>

<td>${d.email}</td>
<td>${new Date(d.date).toLocaleDateString()}</td>

</tr>

`

})


/* APPROVE */

window.approve = async function(id){

await updateDoc(doc(db,"booking_requests",id),{
status:"approved"
})

alert("Show approved")

}


/* REJECT */

window.reject = async function(id){

await updateDoc(doc(db,"booking_requests",id),{
status:"rejected"
})

alert("Show rejected")

}


/* REPLY */

window.reply = function(email){

window.location="mailto:"+email

}


/* EXPORT PROMOTERS */

window.exportPromoters=function(){

const rows=document.querySelectorAll("#bookingTable tbody tr")

let csv="Promoter,Email,Venue,Budget\n"

rows.forEach(r=>{

const cols=r.querySelectorAll("td")

csv+=cols[0].innerText+","+cols[1].innerText+","+cols[2].innerText+","+cols[3].innerText+"\n"

})

downloadCSV(csv,"promoters.csv")

}


/* EXPORT FANS */

window.exportFans=function(){

const rows=document.querySelectorAll("#fanTable tbody tr")

let csv="Email,Date\n"

rows.forEach(r=>{

const cols=r.querySelectorAll("td")

csv+=cols[0].innerText+","+cols[1].innerText+"\n"

})

downloadCSV(csv,"fans.csv")

}


/* CSV DOWNLOAD */

function downloadCSV(data,name){

const blob=new Blob([data])

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download=name

a.click()

}

</script>

</body>
</html>
