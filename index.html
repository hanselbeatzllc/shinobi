<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shinobi</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#f4f4f4;
color:#111;
overflow-x:hidden;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:#d81b60;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:800;
color:white;
text-decoration:none;
}

.menu-toggle{
font-size:28px;
color:white;
cursor:pointer;
}

/* MENU */

.menu{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#d81b60;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:30px;
transform:translateY(-100%);
transition:.4s;
z-index:2000;
}

.menu.active{
transform:translateY(0);
}

.menu a{
color:white;
font-size:28px;
text-decoration:none;
font-weight:700;
}

.menu .close{
position:absolute;
top:25px;
right:30px;
font-size:32px;
cursor:pointer;
}

/* HERO */

.hero{
height:80vh;
background:url("hero.webp") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
}

.hero-box{
background:white;
padding:40px;
border-radius:14px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.hero-box h1{
font-size:40px;
margin-bottom:20px;
}

.hero-box a{
padding:14px 34px;
border:2px solid #d81b60;
color:#d81b60;
text-decoration:none;
border-radius:30px;
font-weight:600;
}

/* SECTION */

.section{
padding:100px 8%;
max-width:1100px;
margin:auto;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.section-header h2{
font-size:34px;
color:#d81b60;
}

.section-header a{
text-decoration:none;
color:#d81b60;
font-weight:600;
}

/* MUSIC */

.music-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;
}

.music-card{
background:white;
border-radius:14px;
overflow:hidden;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.music-card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
}

.music-info{
padding:20px;
}

.music-info h3{
color:#d81b60;
margin-bottom:15px;
}

.stream-btn{
display:inline-block;
padding:10px 26px;
border:2px solid #d81b60;
color:#d81b60;
text-decoration:none;
border-radius:30px;
}

/* VIDEOS */

.video-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;
}

.video-grid iframe{
width:100%;
height:260px;
border:none;
border-radius:10px;
}

/* MERCH */

.merch-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;
}

.merch{
background:white;
border-radius:12px;
overflow:hidden;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.merch img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
}

.buy-btn{
display:inline-block;
margin:20px;
padding:12px 28px;
background:#d81b60;
border-radius:30px;
color:white;
text-decoration:none;
}

/* SIGNUP */

.signup{
background:white;
padding:80px 20px;
text-align:center;
}

.signup input{
padding:14px;
width:260px;
border:none;
border-radius:30px;
margin-right:10px;
background:#eee;
}

.signup button{
padding:14px 28px;
background:#d81b60;
border:none;
border-radius:30px;
color:white;
cursor:pointer;
}

/* FOOTER */

footer{
background:#d81b60;
padding:60px 20px;
text-align:center;
color:white;
}

.footer-icons{
display:flex;
justify-content:center;
gap:26px;
font-size:22px;
margin-bottom:20px;
}

.footer-links{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:10px;
}

.footer-links a{
color:white;
text-decoration:none;
}

.footer-copy{
font-size:13px;
}

/* MOBILE */

@media(max-width:900px){

.music-grid,
.video-grid,
.merch-grid{
grid-template-columns:1fr;
}

.hero-box h1{
font-size:30px;
}

}

</style>

</head>
